<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>
        Você pode escrever um parágrafo de qualquer jeito, basta botar tudo no meio do par de tag &lt;p&gt; e &lt;/p&gt;
    </p>
    <p>
        Se precisar quebrar em algum lugar, <br>você pode usar a tag &lt;br&gt;
    </p>
    <p>
        Vamos adicionar símbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &cent;
        &Delta;
        &uparrow;
    </p>
    <p>
        Babi &#x1F495; Biel
    </p>

</body>
</html>
