<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 07</title>
</head>
<body>
    <h1>Imagens felixíveis</h1>
    <p>Exemplos de imagens felixíveis</p>

    <picture>
        <source media="(max-width:790px)" srcset="img/paisagem-p.png">
        <source media="(max-width:1250px)" srcset="img/paisagem-m.png">
        <img src="img/paisagem-g.png" alt="">
    </picture>

    <h1>Reproduzindo Audio</h1>
    <p>Aprendendo a reproduzir audio em HTML5</p>
    <audio preload="metadata" controls>
        <source src="midia/Teste.mp3" type="audio/mp3">
        <p>Seu navegador não consegue reproduzir o aúdio, clique <a href="midia/Teste.mp3">aqui</a> para baixar.</p>
    </audio>
</body>
</html>
